# flyway.conf

# 1. Neon PostgreSQL Connection URL
# Replace <host>, <database>, and keep sslmode=require
flyway.url=jdbc:postgresql://localhost:5432/moduleyard
# 2. Database Credentials
flyway.user=postgres
flyway.password=postgres

# 3. Where to find your migration scripts
# This tells Flyway to look in the 'sql' folder relative to this config file
flyway.locations=filesystem:sql

# 4. Safety feature
# If your DB already has some default Neon tables, this prevents Flyway from crashing on its first run
flyway.baselineOnMigrate=true

# 5. Dedicated schema for Flyway's history table
flyway.defaultSchema=flyway